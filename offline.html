<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Hors ligne — Daggerheart Companion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #1a1a2e;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.7;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.05); }
    }

    h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #53a8b6;
    }

    p {
      font-size: 1rem;
      line-height: 1.5;
      color: #a0a0b8;
      max-width: 400px;
      margin-bottom: 1rem;
    }

    .retry-btn {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      background-color: #53a8b6;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 150ms ease, transform 150ms ease;
      margin-top: 0.5rem;
    }

    .retry-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .retry-btn:active { transform: translateY(0); }

    .hint {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #6a6a80;
      max-width: 360px;
    }
  </style>
</head>
<body>
  <div class="offline-icon" aria-hidden="true">🗡️</div>
  <h1>Connexion perdue</h1>
  <p>
    Daggerheart Companion n'est pas disponible hors ligne pour cette page.
    Vérifiez votre connexion et réessayez.
  </p>
  <button class="retry-btn" onclick="window.location.reload()">
    Réessayer
  </button>
  <p class="hint">
    Les pages déjà visitées restent accessibles hors ligne.
    Lancez l'application depuis votre écran d'accueil pour un accès complet.
  </p>
</body>
</html>
